<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIB - Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg:#f0f2f5; --surface:#ffffff; --border:#e4e7ec;
    --text:#111827; --muted:#6b7280; --nav:#0f172a;
    --blue:#1d4ed8; --blue-soft:#eff6ff;
    --red:#dc2626; --red-soft:#fef2f2;
    --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'DM Sans',sans-serif;
    background:var(--nav);
    color:var(--text);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
}

.login-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    width:100%; max-width:400px;
    overflow:hidden;
}

.login-header {
    background:linear-gradient(135deg,#dc2626,#7c3aed);
    padding:32px 28px;
    text-align:center;
}

.login-header .logo {
    width:52px; height:52px;
    background:rgba(255,255,255,.15);
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:22px; color:white;
    margin:0 auto 14px;
    backdrop-filter:blur(10px);
}

.login-header h1 { font-size:18px; font-weight:700; color:white; }
.login-header p  { font-size:12px; color:rgba(255,255,255,.7); margin-top:4px; }

.login-body { padding:28px; display:flex; flex-direction:column; gap:16px; }

.field label {
    display:block; font-size:11px; font-weight:600;
    text-transform:uppercase; letter-spacing:.06em;
    color:var(--muted); margin-bottom:6px;
}
.field input {
    width:100%; padding:11px 14px;
    border:1px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit;
    background:#fafafa; outline:none;
    transition:border-color .15s;
}
.field input:focus { border-color:var(--blue); background:white; }

.error {
    background:var(--red-soft); border:1px solid #fca5a5;
    color:var(--red); padding:10px 14px;
    border-radius:8px; font-size:13px; text-align:center;
}

.btn-login {
    width:100%; padding:12px;
    background:var(--nav); color:white;
    border:none; border-radius:8px;
    font-size:14px; font-weight:600;
    cursor:pointer; font-family:inherit;
    transition:opacity .15s; margin-top:4px;
}
.btn-login:hover { opacity:.88; }
</style>
</head>
<body>

<div class="login-card">

    <div class="login-header">
        <div class="logo">A</div>
        <h1>Panel Administrador</h1>
        <p>Corporación para Investigaciones Biológicas</p>
    </div>

    <div class="login-body">

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" style="display:flex;flex-direction:column;gap:16px">

            <div class="field">
                <label>Usuario</label>
                <input type="text" name="usuario" autofocus required>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>

        </form>

    </div>
</div>

</body>
</html>
