<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ 'Editar cita' if cita else 'Nueva cita' }}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f4f6f8;
    color:#1a1a2e;
}

/* HEADER */

header{
    background:#1a1a2e;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:18px;
    font-weight:600;
}

header span{
    font-size:13px;
    color:#aab0c5;
}

.btn-volver{
    text-decoration:none;
    color:white;
    background:#34495e;
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
    font-weight:500;
}

/* CONTENT */

.container{
    max-width:850px;
    margin:40px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:35px;
    border:1px solid #e5e5e5;
    box-shadow:0 8px 20px rgba(0,0,0,0.03);
}

.card h2{
    font-size:22px;
    margin-bottom:8px;
}

.card p{
    font-size:14px;
    color:#777;
    margin-bottom:30px;
}

/* FORM */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.full{
    grid-column:1 / -1;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    font-weight:600;
    color:#444;
}

input,
select,
textarea{
    width:100%;
    padding:12px 14px;
    border:1px solid #dcdcdc;
    border-radius:8px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    outline:none;
    transition:0.2s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#1a73e8;
    box-shadow:0 0 0 3px rgba(26,115,232,0.08);
}

textarea{
    resize:vertical;
    min-height:110px;
}

/* ACTIONS */

.actions{
    margin-top:28px;
    display:flex;
    gap:12px;
}

.btn{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
}

.btn-save{
    background:#1a73e8;
    color:white;
}

.btn-save:hover{
    background:#1666cb;
}

.btn-cancel{
    background:#eef1f5;
    color:#333;
}

.btn-cancel:hover{
    background:#dde3ea;
}

@media(max-width:768px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>

</head>
<body>

<header>
    <div>
        <h1>CIB - Panel de Asesores</h1>
        <span>{{ 'Editar solicitud de cita' if cita else 'Registrar nueva cita' }}</span>
    </div>

    <a href="/asesor" class="btn-volver">← Volver</a>
</header>

<div class="container">

    <div class="card">

        <h2>{{ 'Editar cita' if cita else 'Nueva cita manual' }}</h2>
        <p>Completa la información del paciente y guarda los cambios.</p>

        <form method="POST">

            <div class="grid">

                <div>
                    <label>Nombre completo</label>
                    <input type="text" name="nombre"
                           value="{{ cita.nombre if cita else '' }}" required>
                </div>

                <div>
                    <label>Documento</label>
                    <input type="text" name="documento"
                           value="{{ cita.documento if cita else '' }}" required>
                </div>

                <div>
                    <label>Teléfono</label>
                    <input type="text" name="telefono"
                           value="{{ cita.telefono if cita else '' }}" required>
                </div>

                <div>
                    <label>Tipo de cita</label>
                    <select name="tipo_cita">
                        <option value="presencial"
                        {% if cita and cita.tipo_cita == 'presencial' %}selected{% endif %}>
                        Presencial
                        </option>

                        <option value="domicilio"
                        {% if cita and cita.tipo_cita == 'domicilio' %}selected{% endif %}>
                        Domicilio
                        </option>
                    </select>
                </div>

                <div>
                    <label>Fecha solicitada</label>
                    <input type="text" name="fecha_cita"
                           value="{{ cita.fecha_cita if cita else '' }}"
                           placeholder="Ej: Lunes 27 de Abril">
                </div>

                <div>
                    <label>Estado</label>
                    <select name="estado">

                        <option value="pendiente"
                        {% if cita and cita.estado == 'pendiente' %}selected{% endif %}>
                        Pendiente
                        </option>

                        <option value="confirmada"
                        {% if cita and cita.estado == 'confirmada' %}selected{% endif %}>
                        Confirmada
                        </option>

                        <option value="rechazada"
                        {% if cita and cita.estado == 'rechazada' %}selected{% endif %}>
                        Rechazada
                        </option>

                        <option value="cancelada"
                        {% if cita and cita.estado == 'cancelada' %}selected{% endif %}>
                        Cancelada
                        </option>

                    </select>
                </div>

                <div class="full">
                    <label>Motivo de la cita</label>
                    <textarea name="motivo">{{ cita.motivo if cita else '' }}</textarea>
                </div>

            </div>

            <div class="actions">

                <button type="submit" class="btn btn-save">
                    Guardar cambios
                </button>

                <a href="/asesor" class="btn btn-cancel">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
