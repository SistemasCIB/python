<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log de Mensajes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        table{
           width:  80%;
           border-collapse: collapse;
           margin: 20px auto;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>registro de mensajes</h1>

    <table>
        
            <tr>
                <th>Fecha y Hora</th>
                <th>Mensaje</th>
            </tr>
             {% for registro in registros %}
               <tr>
                    <td>{{ registro.fecha_y_hora }}</td>
                    <td>{{ registro.texto }}</td>
               </tr>
             {% endfor %}
        
  
    </table>
    <p>Puedes agregar más contenido aquí.</p>
</body>
</html>
